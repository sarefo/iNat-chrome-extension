<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 10px;
      text-align: center;
    }
    button:hover {
      background-color: #45a049;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
    .url-button {
      background-color: #2196F3;
    }
    .url-button:hover {
      background-color: #1976D2;
    }
    #fillFieldsDead {
      background-color: #f44336;
    }
    #fillFieldsDead:hover {
      background-color: #d32f2f;
    }
    #fillFieldsJuvenileDead {
      background-color: #f44336;
    }
    #fillFieldsJuvenileDead:hover {
      background-color: #d32f2f;
    }
    .button-row {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }
    .button-row button {
      flex: 1;
      margin-bottom: 0;
    }
    .icon-only {
      font-size: 18px;
      padding: 12px 8px;
    }
    .username-container {
      margin-top: 15px;
      text-align: center;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }
    .username-display {
      background: none;
      border: none;
      color: #666;
      font-size: 12px;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 15px;
      transition: background-color 0.2s;
    }
    .username-display:hover {
      background-color: #f0f0f0;
    }
    .username-input {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 15px;
      padding: 5px 10px;
      font-size: 12px;
      text-align: center;
      width: 120px;
    }
    .username-input:focus {
      outline: none;
      border-color: #4CAF50;
      background: white;
    }
    .bulk-mode-active {
      border: 2px solid #4CAF50;
      background-color: #f0f8f0;
    }
    .bulk-counter {
      text-align: center;
      color: #4CAF50;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 12px;
      display: none;
    }
    .bulk-counter.active {
      display: block;
    }
    .start-button {
      background-color: #FF9800;
      display: none;
      margin-top: 10px;
    }
    .start-button.active {
      display: block;
    }
    .start-button:hover {
      background-color: #F57C00;
    }
    .plant-button {
      background-color: #8BC34A;
    }
    .plant-button:hover {
      background-color: #7CB342;
    }
    .queue-section {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px;
      margin-top: 10px;
    }
    .queue-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .queue-select-all {
      background: none;
      border: none;
      color: #2196F3;
      cursor: pointer;
      font-size: 11px;
      padding: 0;
      margin-bottom: 0;
      width: auto;
      min-width: 0;
      font-weight: normal;
    }
    .queue-select-all:hover {
      text-decoration: underline;
      background: none;
    }
    .queue-badge {
      background: #4CAF50;
      color: white;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 11px;
    }
    .queue-list {
      font-size: 11px;
    }
    .queue-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .queue-item:last-child {
      border-bottom: none;
    }
    .queue-item-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .queue-item-delete {
      background: none;
      border: none;
      color: #f44336;
      cursor: pointer;
      font-size: 13px;
      padding: 0 2px;
      margin-bottom: 0;
      width: auto;
      min-width: 0;
    }
    .process-queues-btn {
      background-color: #7B1FA2;
      margin-top: 6px;
    }
    .process-queues-btn:hover {
      background-color: #6A1B9A;
    }
  </style>
</head>
<body>
  <div class="button-row">
    <button id="fillFieldsAgeUnknown" class="icon-only" title="Fill fields for organism with unknown age">&#10067;</button>
    <button id="fillFieldsJuvenile" class="icon-only" title="Fill fields for living juvenile organism">&#128027;</button>
    <button id="fillFieldsAlive" class="icon-only" title="Fill fields for living adult organism">&#129419;</button>
  </div>
  <div class="button-row">
    <button id="fillFieldsJuvenileDead" title="Fill fields for dead juvenile organism">&#128128; Juvenile</button>
    <button id="fillFieldsDead" title="Fill fields for dead adult organism">&#128128; Adult</button>
  </div>
  <div class="button-row">
    <button id="fillFieldsFlowers" class="plant-button" title="Fill plant phenology: Flowers + Green Leaves">&#127804; Flowers</button>
    <button id="fillFieldsFruits" class="plant-button" title="Fill plant phenology: Fruits/Seeds + Green Leaves">&#127793; Fruits</button>
    <button id="fillFieldsNoFlowersFruits" class="plant-button" title="Fill plant phenology: No Flowers/Fruits + Green Leaves">&#10060; None</button>
  </div>
  <button id="toggleBulkMode" class="url-button" title="Toggle bulk marking mode on observation list pages">Bulk Mark Mode</button>
  <button id="openUrl" class="url-button" title="Open page showing observations without annotations">Obs w/o annotations</button>

  <div id="bulkCounter" class="bulk-counter">0 observations selected</div>
  
  <button id="startBulkProcess" class="start-button" title="Start processing selected observations with chosen annotation type">Start Processing</button>

  <div class="queue-section" id="queueSection" style="display:none">
    <div class="queue-header">
      <span>📋 Queues</span>
      <button id="selectAllQueues" class="queue-select-all">Select All</button>
      <span id="queueBadge" class="queue-badge">0</span>
    </div>
    <div id="queueList" class="queue-list"></div>
    <button id="processQueuesButton" class="process-queues-btn" style="display:none">
      ▶ Process Selected
    </button>
  </div>

  <div id="status" class="status"></div>
  <div class="username-container">
    <button id="username-display" class="username-display" title="Click to edit username">portioid</button>
    <input id="username-input" class="username-input" type="text" style="display: none;" placeholder="Enter username">
  </div>
  <script src="popup.js"></script>
</body>
</html>
